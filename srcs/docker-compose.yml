version: "3.9"

services:
  mariadb:
    build: ./requirements/mariadb
    container_name: mariadb
    restart: unless-stopped
    networks:
      - inception
    volumes:
      - db_data:/var/lib/mysql
    secrets:
      - db_root_password
      - db_password
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  wordpress:
    build: ./requirements/wordpress
    container_name: wordpress
    restart: unless-stopped
    networks:
      - inception
    volumes:
      - wordpress_data:/var/www/html
    secrets:
      - db_password
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_HOST=mariadb

  nginx:
    build: ./requirements/nginx
    container_name: nginx
    restart: unless-stopped
    networks:
      - inception
    ports:
      - "443:443"
    depends_on:
      - wordpress

volumes:
  db_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/maanguit/data/database

  wordpress_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/maanguit/data/website

secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt

networks:
  inception:
    driver: bridge
