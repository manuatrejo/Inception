listen=YES
listen_ipv6=NO
anonymous_enable=NO
local_enable=YES
write_enable=YES
local_umask=022
dirmessage_enable=YES
xferlog_enable=YES
connect_from_port_20=YES
chroot_local_user=YES
allow_writeable_chroot=YES
secure_chroot_dir=/run/vsftpd/empty
user_sub_token=$USER
local_root=/var/www/html
pasv_enable=YES
pasv_min_port=21000
pasv_max_port=21010
pasv_address=${FTP_PASV_ADDRESS}
seccomp_sandbox=NO
